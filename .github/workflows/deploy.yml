name: 🚀 Matrix Deploy to OCI (Mission Critical)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy-production:
    name: 🛠️ Deploy [${{ matrix.environment }}]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    strategy:
      fail-fast: false # Garante que se um nó falhar, o log do outro continue visível
      matrix:
        include:
          - environment: "OCI-Node-01"
            host_secret: OCI_HOST
            port: 1880 # Porta do seu Node-RED ou App

    steps:
      - name: 📦 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 SRE Pre-flight & Secrets Audit
        run: |
          echo "### 🛡️ Auditoria de Segurança e Ambiente" >> $GITHUB_STEP_SUMMARY
          echo "- **Ambiente:** ${{ matrix.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Runner:** $RUNNER_OS" >> $GITHUB_STEP_SUMMARY

          if [ -z "${{ secrets[matrix.host_secret] }}" ]; then
            echo "::error::Host Secret ${{ matrix.host_secret }} não configurada!"
            exit 1
          fi

      - name: 🚢 Executar Deploy & Runtime Mapping
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets[matrix.host_secret] }}
          username: ${{ secrets.OCI_USER || 'ubuntu' }}
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          sync: true
          debug: true
          script_stop: true
          script: |
            set -e # Interrompe no primeiro erro

            echo "================ [ 1. TELEMETRIA DO HOST ] ================"
            echo "Data/Hora: $(date)"
            echo "Hostname: $(hostname)"
            echo "Disk Usage: $(df -h / | tail -1 | awk '{print $5}') ocupado"
            echo "RAM: $(free -h | grep Mem | awk '{print $3 "/" $2}')"
            echo "=========================================================="

            cd ~/advec-automation || { echo "❌ Erro: Repo não encontrado na OCI"; exit 1; }

            echo "📥 2. Sync Git (Hard Reset)..."
            git fetch origin main && git reset --hard origin/main

            echo "🛑 3. Ciclo de Vida do Container (Down/Up)..."
            docker compose down --remove-orphans

            # Streaming do Build diretamente no console do GitHub
            docker compose up -d --build

            echo "⏳ 4. Aguardando Estabilização (20s)..."
            sleep 20

            echo "================ [ 5. MAPA DE RUNTIME ] ================"
            echo "--- LOGS DE STARTUP (Últimas 40 linhas) ---"
            docker compose logs --tail=40

            echo "--- MÉTRICAS DE RECURSOS EM TEMPO REAL ---"
            docker stats --no-stream --format "table {{.Name}}\t{{.CPUPerc}}\t{{.MemUsage}}\t{{.MemPerc}}"

            echo "================ [ 6. HEALTHCHECK SRE ] ================"
            # Validação interna via Localhost
            HTTP_STATUS=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:${{ matrix.port }} || echo "000")

            if [ "$HTTP_STATUS" -eq 200 ] || [ "$HTTP_STATUS" -eq 302 ]; then
              echo "✅ SUCCESS: Aplicação respondendo na porta ${{ matrix.port }} (Status: $HTTP_STATUS)"
              echo "### ✅ Deploy OK em ${{ matrix.environment }}" >> $GITHUB_STEP_SUMMARY
            else
              echo "::error::HEALTHCHECK FAILED! Status: $HTTP_STATUS"
              echo "### ❌ Falha no Healthcheck em ${{ matrix.environment }}" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi

            echo "🧹 7. Pruning e Otimização..."
            docker image prune -f

            echo "=========================================================="
            echo "🚀 DEPLOY FINALIZADO COM SUCESSO"
