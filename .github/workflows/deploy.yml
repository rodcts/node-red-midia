name: 🚀 Deploy to OCI Production

on:
    push:
        branches: [main]
    # Permite acionar o workflow manualmente pela interface do GitHub
    workflow_dispatch:

# Evita concorrência: cancela um deploy em andamento se um novo push for feito
concurrency:
    group: production-deploy
    cancel-in-progress: true

jobs:
    deploy:
        name: 🛠️ Build & Deploy
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: 📦 Checkout Code
              uses: actions/checkout@v4

            - name: SRE Pre-flight Checks
              run: |
                  echo "### 🔍 Verificando Validade de Credenciais" >> $GITHUB_STEP_SUMMARY

                  check_secret() {
                    if [ -z "$1" ]; then
                      echo "❌ **$2**: AUSENTE" >> $GITHUB_STEP_SUMMARY
                      echo "::error::Secret $2 está ausente! Configure no GitHub."
                      exit 1
                    else
                      echo "✅ **$2**: OK" >> $GITHUB_STEP_SUMMARY
                    fi
                  }

                  check_secret "${{ secrets.OCI_HOST }}" "OCI_HOST"
                  check_secret "${{ secrets.OCI_SSH_KEY }}" "OCI_SSH_KEY"

                  if [ -z "${{ secrets.OCI_USER }}" ]; then
                    echo "⚠️ **OCI_USER**: VAZIO (Utilizando fallback 'ubuntu')" >> $GITHUB_STEP_SUMMARY
                  else
                    echo "✅ **OCI_USER**: Customizado" >> $GITHUB_STEP_SUMMARY
                  fi

            - name: 🚢 Executar Deploy via SSH (OCI)
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.OCI_HOST }}
                  username: ${{ secrets.OCI_USER }}
                  key: ${{ secrets.OCI_SSH_KEY }}
                  port: 22
                  script_stop: true # Para a execução imediatamente se qualquer comando falhar (set -e)

                  script: |
                      echo "========================================="
                      echo "🕵️ DETECTANDO SISTEMA OPERACIONAL"
                      echo "========================================="

                      if command -v dnf &> /dev/null; then
                          INSTALL="sudo dnf install -y"
                          UPDATE="sudo dnf makecache"
                          echo "🐧 Sistema detectado: Oracle Linux / RHEL"
                      elif command -v apt-get &> /dev/null; then
                          INSTALL="sudo apt-get install -y"
                          UPDATE="sudo apt-get update"
                          echo "🐧 Sistema detectado: Ubuntu / Debian"
                      else
                          echo "❌ Gerenciador de pacotes não suportado!"
                          exit 1
                      fi

                      echo "📦 INSTALANDO TOOLCHAIN DEVOPS..."
                      $UPDATE
                      $INSTALL git curl jq tar gzip ca-certificates

                      echo "🐋 CONFIGURANDO DOCKER (Automático)..."
                      if ! command -v docker &> /dev/null; then
                          curl -fsSL https://get.docker.com | sudo sh
                          sudo systemctl enable --now docker
                          sudo usermod -aG docker $USER
                      fi

                      echo "📂 PREPARANDO AMBIENTE DO PROJETO..."
                      mkdir -p ~/advec-automation/data
                      cd ~/advec-automation

                      if [ ! -d ".git" ]; then
                      echo "🚚 Clonando repositório..."
                      git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git .
                      fi

                      echo "📥 SINCRONIZANDO CÓDIGO..."
                      git fetch origin ${{ github.ref_name }}
                      git reset --hard origin/${{ github.ref_name }}

                      echo "🚀 SUBINDO CONTAINERS..."
                      # Forçamos o uso do binário do docker-compose independente da distro
                      sudo docker compose up -d --build

                      echo "========================================="
                      echo "✅ INFRA E DEPLOY CONCLUÍDOS!"
                      echo "========================================="

            - name: 🩺 Healthcheck & Container Status
              if: success()
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.OCI_HOST }}
                  username: ${{ secrets.OCI_USER || 'ubuntu' }}
                  key: ${{ secrets.OCI_SSH_KEY }}
                  port: 22
                  script: |
                      echo "### Status Atual dos Containers na OCI:"
                      docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep node-red || true
