name: 🚀 Deploy to OCI Production

on:
    push:
        branches: [main]
    # Permite acionar o workflow manualmente pela interface do GitHub
    workflow_dispatch:

# Evita concorrência: cancela um deploy em andamento se um novo push for feito
concurrency:
    group: production-deploy
    cancel-in-progress: true

jobs:
    deploy:
        name: 🛠️ Build & Deploy
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: 📦 Checkout Code
              uses: actions/checkout@v4

            - name: SRE Pre-flight Checks
              run: |
                  echo "### 🔍 Verificando Validade de Credenciais" >> $GITHUB_STEP_SUMMARY

                  check_secret() {
                    if [ -z "$1" ]; then
                      echo "❌ **$2**: AUSENTE" >> $GITHUB_STEP_SUMMARY
                      echo "::error::Secret $2 está ausente! Configure no GitHub."
                      exit 1
                    else
                      echo "✅ **$2**: OK" >> $GITHUB_STEP_SUMMARY
                    fi
                  }

                  check_secret "${{ secrets.OCI_HOST }}" "OCI_HOST"
                  check_secret "${{ secrets.OCI_SSH_KEY }}" "OCI_SSH_KEY"

                  if [ -z "${{ secrets.OCI_USER }}" ]; then
                    echo "⚠️ **OCI_USER**: VAZIO (Utilizando fallback 'ubuntu')" >> $GITHUB_STEP_SUMMARY
                  else
                    echo "✅ **OCI_USER**: Customizado" >> $GITHUB_STEP_SUMMARY
                  fi

            - name: 🚢 Executar Deploy e Monitorar Logs
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.OCI_HOST }}
                  username: ${{ secrets.OCI_USER || 'ubuntu' }}
                  key: ${{ secrets.OCI_SSH_KEY }}
                  port: 22
                  # CRITICAL: Habilita o streaming de saída em tempo real
                  debug: true
                  script_stop: true
                  script: |
                      cd ~/advec-automation

                      echo "🏗️ 1/2 Iniciando Build e Up (Acompanhe abaixo)..."
                      # O comando 'up' com --build mostra o log de compilação do Dockerfile
                      sudo docker compose up -d --build

                      echo "⏳ 2/2 Aguardando 15s para validar o startup do container..."
                      # O truque do SRE: tail nos logs por X segundos e depois encerra o passo
                      # Isso permite ver se o Node-RED subiu sem erros de permissão ou conexão
                      sudo timeout 15s docker logs -f node-red-advec || true

                      echo "========================================="
                      echo "✅ STATUS FINAL DOS CONTAINERS:"
                      sudo docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
                      echo "========================================="

            - name: 🩺 Healthcheck & Container Status
              if: success()
              uses: appleboy/ssh-action@v1.0.3
              with:
                  host: ${{ secrets.OCI_HOST }}
                  username: ${{ secrets.OCI_USER || 'ubuntu' }}
                  key: ${{ secrets.OCI_SSH_KEY }}
                  port: 22
                  debug: true
                  script: |
                      echo "### Status Atual dos Containers na OCI:"
                      docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}" | grep node-red || true
