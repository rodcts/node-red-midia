name: Deploy to OCI - Debug Mode

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 SRE Debug Step
        run: |
          echo "Verificando variáveis de ambiente..."
          if [ -z "${{ secrets.OCI_HOST }}" ]; then echo "❌ OCI_HOST: VAZIO"; else echo "✅ OCI_HOST: OK"; fi
          if [ -z "${{ secrets.OCI_SSH_KEY }}" ]; then echo "❌ OCI_SSH_KEY: VAZIO"; else echo "✅ OCI_SSH_KEY: OK"; fi
          if [ -z "${{ secrets.OCI_USER }}" ]; then echo "⚠️ OCI_USER: VAZIO (usando default)"; fi

      - name: 🚀 Deploy via SSH
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          port: 22
          script: |
            cd ~/advec-automation
            git pull origin main
            docker compose down
            docker compose up -d --build
