services:
  node-red:
    image: nodered/node-red:latest
    container_name: node-red-advec
    restart: always
    ports:
      - "1880:1880"
    volumes:
      - ./data:/data
    environment:
      - TZ=America/Sao_Paulo
      - NODE_RED_ENABLE_PROJECTS=true # Ativa integração nativa com Git
    networks:
      - media-net

networks:
  media-net:
    driver: bridge
